name: Verify and Publish Portfolio

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: pratikbhattarai76/portfolio-app

concurrency:
  group: portfolio-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run application verification
        run: npm run ci:verify

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for verification
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          cache-from: type=gha,scope=portfolio-app
          cache-to: type=gha,mode=max,scope=portfolio-app

  build-and-push:
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short,prefix=commit-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=portfolio-app
          cache-to: type=gha,mode=max,scope=portfolio-app

  update-deployment:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout homelab repo
        uses: actions/checkout@v4
        with:
          repository: pratikbhattarai76/k8s-homelab-platform
          token: ${{ secrets.PORTFOLIO_K8S_SERVER_DEPLOYMENT }}

      - name: Update image tag
        run: |
          sed -i "s|image: ghcr.io/pratikbhattarai76/portfolio-app:.*|image: ghcr.io/pratikbhattarai76/portfolio-app:commit-${GITHUB_SHA::7}|" manifests/apps/portfolio/deployment.yml

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add manifests/apps/portfolio/deployment.yml
          git commit -m "deploy: portfolio commit-${GITHUB_SHA::7}"
          git push
